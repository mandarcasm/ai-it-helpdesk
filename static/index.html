<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helpdesk AI — L1 Assistant</title>
<style>
  :root {
    --bg: #0b0e12;
    --panel: #12161d;
    --line: #232a35;
    --text: #d9e0e8;
    --muted: #6b7684;
    --accent: #4fd1a5;
    --accent-dim: #2a8f6d;
    --warn: #e0a458;
    --mono: 'SF Mono', 'Roboto Mono', Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0;
    color: var(--text);
  }
  header span {
    color: var(--muted);
    font-size: 12px;
  }
  .ticket-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    text-decoration: none;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 6px 12px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .ticket-btn:hover {
    background: var(--accent-dim);
    color: #06110c;
  }
  main {
    flex: 1;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
  }
  .msg {
    max-width: 88%;
    padding: 12px 14px;
    border-radius: 3px;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: #1a2028;
    border: 1px solid var(--line);
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--panel);
    border-left: 2px solid var(--accent);
  }
  .msg.bot.error {
    border-left-color: var(--warn);
  }
  .sources {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px dashed var(--line);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .sources b { color: var(--accent-dim); }
  .inline-ticket {
    display: inline-block;
    margin-top: 10px;
    font-size: 11px;
    color: var(--warn);
    text-decoration: none;
    border-bottom: 1px dashed var(--warn);
  }
  .inline-ticket:hover { color: var(--accent); border-color: var(--accent); }
  .quick-action {
    display: block;
    margin-top: 12px;
    background: var(--accent);
    color: #06110c;
    text-decoration: none;
    font-weight: 700;
    font-size: 12px;
    text-align: center;
    padding: 10px 14px;
    border-radius: 3px;
  }
  .quick-action:hover { background: var(--accent-dim); }
  .empty {
    color: var(--muted);
    font-size: 13px;
    padding: 40px 0;
    text-align: center;
    line-height: 1.8;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .chip {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
  }
  .chip:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }
  footer {
    border-top: 1px solid var(--line);
    padding: 14px 20px;
  }
  .credit {
    max-width: 760px;
    margin: 8px auto 0;
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  form {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
  }
  input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 14px;
    border-radius: 3px;
    outline: none;
  }
  input:focus { border-color: var(--accent-dim); }
  button {
    background: var(--accent);
    color: #06110c;
    border: none;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0 20px;
    border-radius: 3px;
    cursor: pointer;
  }
  button:disabled { background: var(--muted); cursor: not-allowed; }
  .typing { color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>Helpdesk AI · L1 Assistant</h1>
  <a id="ticket-link" class="ticket-btn" href="#" target="_blank" rel="noopener">🎫 Raise a Ticket</a>
  <span id="status">checking backend…</span>
</header>

<main id="log">
  <div class="empty">
    Ask a question like it's a real ticket — or tap an example below.
    <div class="chips">
      <button class="chip" type="button">My VPN keeps disconnecting</button>
      <button class="chip" type="button">I forgot my password</button>
      <button class="chip" type="button">Printer won't print</button>
      <button class="chip" type="button">Outlook isn't syncing</button>
      <button class="chip" type="button">My laptop won't turn on</button>
      <button class="chip" type="button">New employee starting Monday</button>
      <button class="chip" type="button">I got a suspicious email</button>
      <button class="chip" type="button">Wi-Fi keeps dropping</button>
    </div>
  </div>
</main>

<footer>
  <form id="chat-form">
    <input id="input" type="text" placeholder="Describe the issue…" autocomplete="off" required>
    <button type="submit" id="send-btn">Send</button>
  </form>
  <div class="credit">Built by MandarK (mandarcasm)</div>
</footer>

<script>
  const API_BASE = ''; // same-origin; change to your deployed backend URL if hosted separately
  const log = document.getElementById('log');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const statusEl = document.getElementById('status');

  async function checkHealth() {
    try {
      const res = await fetch(`${API_BASE}/health`);
      const data = await res.json();
      statusEl.textContent = data.collection_ready ? 'kb loaded' : 'kb not ingested — run ingest.py';
      if (data.ticket_url) {
        document.getElementById('ticket-link').href = data.ticket_url;
      }
    } catch {
      statusEl.textContent = 'backend unreachable';
    }
  }
  checkHealth();

  document.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      input.value = btn.textContent;
      form.requestSubmit();
    });
  });

  function addMessage(role, text, sources, ticketUrl, quickActionUrl, quickActionLabel) {
    const empty = log.querySelector('.empty');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;

    if (sources && sources.length) {
      const src = document.createElement('div');
      src.className = 'sources';
      src.innerHTML = '<b>Source:</b> ' + sources.join(', ');
      div.appendChild(src);
    }
    if (quickActionUrl && role.startsWith('bot')) {
      const action = document.createElement('a');
      action.href = quickActionUrl;
      action.target = '_blank';
      action.rel = 'noopener';
      action.className = 'quick-action';
      action.textContent = quickActionLabel || 'Take action';
      div.appendChild(action);
    }
    if (ticketUrl && role.startsWith('bot')) {
      const ticket = document.createElement('a');
      ticket.href = ticketUrl;
      ticket.target = '_blank';
      ticket.rel = 'noopener';
      ticket.className = 'inline-ticket';
      ticket.textContent = '🎫 Still stuck? Raise a ticket';
      div.appendChild(ticket);
    }
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addMessage('user', question);
    input.value = '';
    sendBtn.disabled = true;

    const thinking = addMessage('bot', 'searching KB…');
    thinking.classList.add('typing');

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      thinking.remove();

      if (!res.ok) {
        addMessage('bot error', data.detail || 'Something went wrong.');
      } else {
        addMessage('bot', data.answer, data.sources, data.ticket_url, data.quick_action_url, data.quick_action_label);
      }
    } catch (err) {
      thinking.remove();
      addMessage('bot error', 'Could not reach the backend. Is it running?');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>

</body>
</html>
